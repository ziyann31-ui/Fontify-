services:
  - type: worker
    name: font-crafter-bot
    env: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME   # Change this
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: MONGO_URI
        sync: false
      - key: BOT_USERNAME
        sync: false